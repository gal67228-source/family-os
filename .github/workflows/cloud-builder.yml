name: Cloud Builder

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: Temporary private ZIP URL
        required: true
        type: string
      version:
        description: Semantic version
        required: true
        type: string
      upload_key:
        description: Internal upload identifier
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: cloud-builder
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download uploaded ZIP
        env:
          ZIP_URL: ${{ inputs.zip_url }}
        run: |
          curl --fail --location --retry 3 \
            --output /tmp/family-os.zip \
            "$ZIP_URL"

      - name: Extract uploaded source
        run: |
          test "$(stat -c%s /tmp/family-os.zip)" -le 99614720
          unzip -tq /tmp/family-os.zip

          rm -rf /tmp/family-os-source
          mkdir -p /tmp/family-os-source
          unzip -q /tmp/family-os.zip -d /tmp/family-os-source

          if find /tmp/family-os-source -type l | grep -q .; then
            echo "Symbolic links are not allowed."
            exit 1
          fi

          rm -rf /tmp/family-os-source/.git
          test -f /tmp/family-os-source/apps/mobile/pubspec.yaml
          test -f /tmp/family-os-source/tools/ci/cloud_build.sh

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Run versioned build script
        env:
          BUILD_VERSION: ${{ inputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash /tmp/family-os-source/tools/ci/cloud_build.sh
